name: Build Release (APK × 3 + AAB)

# Builds a signed release for production / Play Store.
# Produces four artifacts:
#   • arm64-v8a APK   — 64-bit ARM devices (most modern phones)
#   • armeabi-v7a APK — 32-bit ARM devices (older phones)
#   • universal APK   — works on every device (largest file)
#   • AAB             — Play Store submission
#
# Manual trigger only — requires keystore secrets to be configured.
#
# ── Required secrets ──────────────────────────────────────────────────────────
# Add these in:
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   RELEASE_KEYSTORE_BASE64   base64-encoded .jks keystore file
#   RELEASE_STORE_PASSWORD    keystore store password
#   RELEASE_KEY_ALIAS         key alias inside the keystore
#   RELEASE_KEY_PASSWORD      key password
#
# Generate a keystore once (keep the .jks file safe — you need it forever):
#   keytool -genkeypair -v -keystore release.keystore \
#     -alias focusflow -keyalg RSA -keysize 2048 -validity 10000
#
# Encode it for the secret:
#   Linux:  base64 -w0 release.keystore
#   macOS:  base64 release.keystore | pbcopy
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

env:
  NPM_CONFIG_NODE_LINKER: hoisted
  EXPO_ROUTER_APP_ROOT: app

jobs:
  build:
    name: Release APK (arm64 + arm32 + universal) + AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Toolchain ───────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── 3. Caches ──────────────────────────────────────────────────────────
      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 4. JS dependencies ─────────────────────────────────────────────────
      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Expo Prebuild ───────────────────────────────────────────────────
      - name: Expo Prebuild
        working-directory: artifacts/focusflow
        run: npx expo prebuild --platform android --clean --no-install

      # ── 6. Patch build.gradle — enable universal APK alongside ABI splits ──
      #      React Native's default sets universalApk false, which means
      #      assembleRelease only emits per-ABI APKs (arm64, armeabi-v7a)
      #      and no universal file.  Flipping it to true adds the universal APK.
      - name: Patch build.gradle — enable universalApk
        working-directory: artifacts/focusflow/android
        run: |
          sed -i 's/universalApk false/universalApk true/g' app/build.gradle
          echo "Patched build.gradle:"
          grep -n "universalApk" app/build.gradle

      # ── 7. Decode keystore ─────────────────────────────────────────────────
      - name: Decode release keystore
        working-directory: artifacts/focusflow/android
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
          echo "Keystore decoded: $(du -sh release.keystore)"

      # ── 8. Build release APKs (arm64-v8a + armeabi-v7a + universal) ────────
      - name: Build release APKs
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"
          echo "── APK outputs ──"
          find app/build/outputs/apk/release/ -name "*.apk" | sort

      # ── 9. Build release AAB ───────────────────────────────────────────────
      - name: Build release AAB
        working-directory: artifacts/focusflow/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"
          echo "── AAB output ──"
          find app/build/outputs/bundle/release/ -name "*.aab" | sort

      # ── 10. Upload APK — arm64-v8a ─────────────────────────────────────────
      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-arm64-v8a-release-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
          retention-days: 30

      # ── 11. Upload APK — armeabi-v7a ───────────────────────────────────────
      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-armeabi-v7a-release-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
          retention-days: 30

      # ── 12. Upload APK — universal ─────────────────────────────────────────
      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-universal-release-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/apk/release/app-universal-release.apk
          retention-days: 30

      # ── 13. Upload AAB ─────────────────────────────────────────────────────
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: focusflow-release-aab-${{ github.run_number }}
          path: artifacts/focusflow/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 14. Cleanup keystore ───────────────────────────────────────────────
      - name: Remove keystore from runner
        if: always()
        working-directory: artifacts/focusflow/android
        run: rm -f release.keystore
